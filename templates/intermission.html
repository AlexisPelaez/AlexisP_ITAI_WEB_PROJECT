<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Page</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="welcome-bg">
    <div class="row">
        <div class="col-md-12 d-flex align-items-center justify-content-center">
            <h1 class="welcome-text">What is your profession?</h1>
        </div>
    </div>
    <div class="row">
        <div class="col-md-12 d-flex align-items-center justify-content-center">
            <form method="POST" action="{{ url_for('main.handle_profession') }}">
                <textarea class="form-control profession-input intermission_box" id="profession" name="profession" rows="3" placeholder="Enter your profession here..."></textarea>
                <button type="submit" class="welcome-button">Submit</button>
            </form>
        </div>
</body>
</html>
