<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Page</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="data-bg">
    <nav class="navbar navbar-expand-lg navbar-dark glass-nav">
        <div class="container-fluid">
            <a class="navbar-brand mb-0 h1" href="#">DeTech</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                <div class="navbar-nav">
                  <a class="nav-link" href="{{ url_for('main.index') }}">Home</a>
                  <a class="nav-link" href="{{ url_for('main.info_page') }}">Info</a>
                  <a class="nav-link" href="{{ url_for('main.simulator_page') }}">Simulator</a>
                  <a class="nav-link active" aria-current="page" href="{{ url_for('main.show') }}">Data</a>
                </div>
              </div>
        </div>
    </nav>
    <div class="container-fluid page-content">
        <div class="container mt-4">
            <h1>Simulator Responses</h1>
            <table class="table table-striped table-bordered mt-3">
                <thead class="table-dark">
                    <tr> 
                        <th>ID</th>
                        <th>Q1</th>
                        <th>Q2</th>
                        <th>Q3</th>
                        <th>Q4</th>
                        <th>Q5</th>
                    </tr>
                </thead>
                <tbody>
                    {% for r in responses %}
                    <tr> 
                        <td>{{ r.id }}</td>
                        <td>{{ r.q1 }}</td>
                        <td>{{ r.q2 }}</td>
                        <td>{{ r.q3 }}</td>
                        <td>{{ r.q4 }}</td>
                        <td>{{ r.q5 }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            {% if responses|length == 0 %}
            <p>No responses yet.</p>
            {% endif %}
        </div>
    </div>
    <nav class="navbar navbar-dark glass-nav fixed-bottom">
        <div class="container-fluid justify-content-center">
            <a class="nav-link text-light mx-3" href="mailto:contact@detech.com">Email: contact@detech.com</a>
            <a class="nav-link text-light mx-3" href="tel:+15555555555">Call: +1 555-555-5555</a>
            <a class="nav-link text-light mx-3">Contact Form</a>
        </div>
    </nav>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
